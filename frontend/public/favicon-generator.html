<!doctype html>
<html>
  <head>
    <title>Favicon Generator</title>
  </head>
  <body>
    <h2>Alif Restaurant Favicon Generator</h2>
    <p>
      Right-click on the image below and save as PNG, then convert to ICO using
      an online tool.
    </p>
    <canvas
      id="canvas"
      width="512"
      height="512"
      style="border: 1px solid #ccc"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // Background circle
      ctx.fillStyle = "#0d5f4e";
      ctx.beginPath();
      ctx.arc(256, 256, 256, 0, Math.PI * 2);
      ctx.fill();

      // Letter 'A' for Alif
      ctx.fillStyle = "#d4a843";
      ctx.beginPath();
      ctx.moveTo(256, 128);
      ctx.lineTo(332, 332);
      ctx.lineTo(307, 332);
      ctx.lineTo(291, 291);
      ctx.lineTo(220, 291);
      ctx.lineTo(204, 332);
      ctx.lineTo(179, 332);
      ctx.closePath();
      ctx.fill();

      // Horizontal bar of 'A'
      ctx.fillRect(230, 266, 51, 15);

      // Fork
      ctx.fillStyle = "#d4a843";
      ctx.fillRect(153, 332, 10, 51);
      ctx.fillRect(148, 332, 5, 15);
      ctx.fillRect(163, 332, 5, 15);

      // Spoon
      ctx.beginPath();
      ctx.ellipse(358, 342, 10, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(353, 357, 10, 26);

      // Decorative line
      ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(179, 383);
      ctx.lineTo(332, 383);
      ctx.stroke();
    </script>
  </body>
</html>
