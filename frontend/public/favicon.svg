  <!-- Letter 'A' for Alif in bold, clean style -->
  <path d="M 50 28 L 68 72 L 60 72 L 57 64 L 43 64 L 40 72 L 32 72 Z M 46 57 L 54 57 L 50 40 Z" fill="#d4a843" stroke="#d4a843" stroke-width="1" stroke-linejoin="round"/>
  
  <!-- Simple fork on left -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="28" y="75" width="2" height="10" rx="1"/>
    <rect x="32" y="75" width="2" height="10" rx="1"/>
    <rect x="28" y="72" width="6" height="3" rx="1"/>
  </g>
  
  <!-- Simple spoon on right -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="69" cy="74" r="3"/>
    <rect x="68" y="77" width="2" height="8" rx="1"/>
  </g>
</svg>
